<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3X_V3_ULTIMATE_INTERFACE</title>
    
    <!-- External Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-color: #050505;
        }

        /* Glassmorphism Box */
        .login-box {
            position: relative;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #38bdf8;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group i {
            position: absolute;
            left: 0;
            top: 12px;
            color: #38bdf8;
        }

        .input-group input {
            width: 100%;
            padding: 10px 10px 10px 30px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #38bdf8;
            outline: none;
            color: #fff;
            font-size: 16px;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 30px;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            pointer-events: none;
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -20px;
            left: 0;
            font-size: 12px;
            color: #38bdf8;
        }

        #togglePassword {
            left: auto;
            right: 0;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover { background: #7dd3fc; box-shadow: 0 0 20px #38bdf8; }

        /* Terminal Log Style */
        .terminal-box {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 200px;
            height: 100px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #38bdf8;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 9px;
            padding: 5px;
            z-index: 20;
            border-radius: 5px;
            overflow-y: hidden;
        }

        .signup-link {
            text-align: center;
            color: #fff;
            margin-top: 20px;
            font-size: 13px;
        }

        .signup-link a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>

    <div class="terminal-box" id="terminal">
        <div>[SYSTEM_READY]</div>
    </div>

    <div class="login-box">
        <form id="loginForm">
            <h2>R3X_V3</h2>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" required>
                <label>Username / Player ID</label>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" required>
                <label>Secure Key</label>
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>
            <button type="submit" class="login-btn" id="submitBtn">Initialize Bypass</button>
            <p class="signup-link">New Sector? <a href="#">Create Nexus</a></p>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

    <script>
        // Background Animation
        VANTA.WAVES({
            el: "body",
            mouseControls: true,
            touchControls: true,
            gyroControls: true,
            color: 0x070b14,
            waveHeight: 15.00,
            waveSpeed: 0.50,
            zoom: 0.90
        });

        const term = document.getElementById('terminal');
        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            term.appendChild(div);
            if (term.childNodes.length > 6) term.removeChild(term.firstChild);
        }

        // Toggle Password
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#password');
        togglePassword.addEventListener('click', function() {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            addLog("UI_VISIBILITY_CHANGED");
        });

        // Form Submit
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const btn = document.getElementById('submitBtn');
            
            btn.innerText = "BYPASSING...";
            btn.style.background = "#ff0000";
            addLog(`ATTEMPT_LOGIN: ${user}`);

            setTimeout(() => {
                addLog("CONNECTION_ESTABLISHED");
                setTimeout(() => {
                    addLog("DATA_SYNC_COMPLETE");
                    alert("R3X_V3: ACCESS GRANTED");
                    btn.innerText = "INITIALIZE BYPASS";
                    btn.style.background = "#38bdf8";
                    loginForm.reset();
                }, 1000);
            }, 1500);
        });

        addLog("R3X_CORE_V3_ONLINE");
    </script>
</body>
</html>
